openapi: 3.0.0
info:
  title: PubMed Search API
  version: 1.0.0
  description: Search PubMed for research papers

servers:
  - url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
paths:
  /esearch.fcgi:
    get:
      operationId: searchPubMed
      summary: Search PubMed database
      description: Search for articles in PubMed
      parameters:
        - name: db
          in: query
          required: true
          schema:
            type: string
            default: pubmed
        - name: term
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: retmax
          in: query
          schema:
            type: integer
            default: 10
          description: Maximum number of results
        - name: retmode
          in: query
          schema:
            type: string
            default: json
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  esearchresult:
                    type: object
                    properties:
                      idlist:
                        type: array
                        items:
                          type: string